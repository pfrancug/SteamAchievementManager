name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore SAM.sln

      - name: Build solution
        run: dotnet build SAM.sln --configuration Release --no-restore

      - name: Create release package
        run: Compress-Archive -Path Release\* -DestinationPath SAM-Release.zip -Exclude Release\Debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SAM-Release
          path: SAM-Release.zip
